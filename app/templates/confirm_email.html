
{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title text-center">Email Confirmation</h3>
                </div>
                <div class="card-body text-center">
                    {% if success %}
                        <div class="alert alert-success">
                            Your email has been confirmed successfully!
                            <br><br>
                            <a href="{{ url_for('login_page') }}" class="btn btn-primary">Log In</a>
                        </div>
                    {% else %}
                        <div class="alert alert-danger">
                            {{ error_message }}
                        </div>
                        {% if show_resend %}
                            <div class="mt-3">
                                <a href="{{ url_for('resend_confirmation_page', email=email) }}" class="btn btn-primary">
                                    Request New Confirmation Email
                                </a>
                            </div>
                        {% endif %}
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
